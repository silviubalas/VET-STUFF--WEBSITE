<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Resetare parolă | VET STUFF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:#D42B2B;
      --navy:#213967;
      --teal:#37858B;
      --teal-dark:#2B6F74;
      --border:#E3E8EA;
      --muted:#6F7885;
      --bg:#F7FAFA;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:"DM Sans", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color:#30343A;
      background:linear-gradient(180deg, #fff 0%, var(--bg) 100%);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:28px 16px;
    }
    .shell { width:min(100%, 560px); }
    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:22px;
      color:var(--navy);
      font-weight:900;
      letter-spacing:.02em;
    }
    .brand-mark {
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      color:#fff;
      background:var(--red);
      font-weight:900;
    }
    .card {
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 18px 50px rgba(34,57,103,.08);
      padding:34px;
    }
    h1 {
      margin:0 0 10px;
      font-family:"Playfair Display", Georgia, serif;
      font-size:clamp(2.1rem, 8vw, 3.2rem);
      line-height:1.05;
      color:var(--navy);
    }
    p { color:var(--muted); line-height:1.6; margin:0 0 22px; }
    label { display:block; color:var(--navy); font-weight:900; font-size:.86rem; text-transform:uppercase; letter-spacing:.04em; margin:16px 0 8px; }
    input {
      width:100%;
      min-height:56px;
      border:1.5px solid var(--border);
      border-radius:12px;
      padding:0 16px;
      font:inherit;
      color:#30343A;
      outline:none;
      background:#fff;
    }
    input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(55,133,139,.14); }
    button {
      width:100%;
      min-height:58px;
      border:0;
      border-radius:12px;
      margin-top:22px;
      background:linear-gradient(90deg, #C9312D 0%, #E95367 100%);
      color:#fff;
      font:inherit;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 12px 26px rgba(212,43,43,.18);
    }
    button:disabled { opacity:.55; cursor:not-allowed; box-shadow:none; }
    .status {
      display:none;
      margin-top:16px;
      border-radius:12px;
      padding:14px 16px;
      font-weight:800;
      line-height:1.45;
    }
    .status.error { display:block; background:#FEF2F2; color:#B91C1C; }
    .status.success { display:block; background:#DCFCE7; color:#166534; }
    .links {
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:20px;
    }
    .links a { color:var(--teal-dark); font-weight:900; text-decoration:underline; }
    @media (max-width:520px) {
      .card { padding:24px; border-radius:14px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="brand">
      <div class="brand-mark">VS</div>
      <div>VET STUFF</div>
    </div>
    <section class="card">
      <h1>Setează parola</h1>
      <p id="lead">Alege o parolă nouă pentru contul tău de programări online.</p>

      <form id="reset-form">
        <label for="password">Parolă nouă</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required placeholder="Minim 6 caractere">

        <label for="confirm">Confirmă parola</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" minlength="6" required placeholder="Repetă parola">

        <button id="submit-btn" type="submit">Salvează parola</button>
      </form>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <div class="links">
        <a href="programare.html">Înapoi la programări</a>
        <a href="index.html">Pagina principală</a>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('reset-form');
    const statusBox = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');
    const lead = document.getElementById('lead');

    const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    const accessToken = hash.get('access_token') || '';
    const resetType = hash.get('type') || '';

    if (!accessToken) {
      setStatus('error', 'Linkul este invalid sau a expirat. Solicită un link nou din pagina de programări.');
      form.style.display = 'none';
    } else if (resetType === 'invite') {
      lead.textContent = 'Invitația este validă. Setează parola pentru contul tău de programări online.';
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      const password = form.password.value;
      const confirm = form.confirm.value;
      if (password.length < 6) {
        setStatus('error', 'Parola trebuie să aibă minim 6 caractere.');
        return;
      }
      if (password !== confirm) {
        setStatus('error', 'Parolele nu coincid.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Se salvează...';
      setStatus('', '');

      try {
        const configRes = await fetch('/api/public-config');
        const config = await configRes.json();
        if (!configRes.ok || !config.ok) throw new Error(config.error || 'Config indisponibil');

        const response = await fetch(`${config.url}/auth/v1/user`, {
          method: 'PUT',
          headers: {
            apikey: config.anonKey,
            Authorization: `Bearer ${accessToken}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ password }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const message = data?.msg || data?.error_description || data?.error || 'Parola nu a putut fi salvată.';
          throw new Error(message);
        }

        form.style.display = 'none';
        setStatus('success', 'Parola a fost salvată. Te poți conecta acum ca „Client existent” în pagina de programări.');
      } catch (err) {
        setStatus('error', err?.message || 'A apărut o eroare. Încearcă din nou.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Salvează parola';
      }
    });

    function setStatus(type, message) {
      statusBox.className = type ? `status ${type}` : 'status';
      statusBox.textContent = message;
    }
  </script>
</body>
</html>
